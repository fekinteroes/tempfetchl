name: fetch2
on: workflow_dispatch
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - run: |
          mkdir -p out
          curl -L 'https://moderngov.lambeth.gov.uk/mgCalendarMonthView.aspx?GL=1&bcr=1&M=1&Y=2026' -o out/cal0.html
          curl -L 'https://moderngov.lambeth.gov.uk/mgCalendarMonthView.aspx?M=1&Y=2026' -o out/cal1.html
          curl -L 'https://moderngov.lambeth.gov.uk/mgCalendarMonthView.aspx?M=1&DD=20260101' -o out/cal2.html
          curl -L 'https://moderngov.lambeth.gov.uk/mgCalendarMonthView.aspx?GL=1&bcr=1' -o out/cal3.html
          curl -L 'https://moderngov.lambeth.gov.uk/mgCalendarMonthView.aspx?M=1&DD=2026' -o out/cal4.html
          curl -L 'https://moderngov.lambeth.gov.uk/mgCalendarMonthView.aspx?M=1&YEAR=2026' -o out/cal5.html
          curl -L 'https://moderngov.lambeth.gov.uk/mgCalendarMonthView.aspx?M=1&DD=2026&bcr=1' -o out/cal6.html
          curl -L 'https://moderngov.lambeth.gov.uk/mgCalendarMonthView.aspx?M=202601&bcr=1' -o out/cal7.html
      - uses: actions/upload-artifact@v4
        with:
          name: pages2
          path: out
